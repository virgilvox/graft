name: JS SDK CI

on:
  push:
    paths: ['sdk/js/**', 'protocol/**', '.github/workflows/js-ci.yml']
  pull_request:
    paths: ['sdk/js/**', 'protocol/**', '.github/workflows/js-ci.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install
        run: cd sdk/js && npm ci
      - name: Typecheck
        run: cd sdk/js && npx tsc --noEmit -p tsconfig.check.json
      - name: Test
        run: cd sdk/js && npx vitest run
