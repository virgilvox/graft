name: Go CI

on:
  push:
    paths: ['sdk/go/**', 'protocol/**']
  pull_request:
    paths: ['sdk/go/**', 'protocol/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        working-directory: sdk/go
        run: go test ./...
      - name: Vet
        working-directory: sdk/go
        run: go vet ./...
