name: Firmware Build

on:
  push:
    branches: [main]
    paths: ['firmware/**', '.github/workflows/firmware-build.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: esp32dev
            name: ESP32
          - board: uno
            name: Arduino Uno R3
          - board: uno_r4_minima
            name: Arduino Uno R4 Minima
          - board: pico
            name: Raspberry Pi Pico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-build-${{ matrix.board }}-${{ hashFiles('firmware/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install platformio
      - name: Build ${{ matrix.name }}
        working-directory: firmware
        run: pio ci --board=${{ matrix.board }} examples/BasicBlink/BasicBlink.ino --lib=src --build-dir=.pio/ci-build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            firmware/.pio/ci-build/.pio/build/*/firmware.*
          if-no-files-found: warn
