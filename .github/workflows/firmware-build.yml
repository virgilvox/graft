name: Firmware Build

on:
  push:
    branches: [main]
    paths: ['firmware/**', '.github/workflows/firmware-build.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ESP32 family (PlatformIO board IDs)
          - board: esp32dev
            name: ESP32
            flags: -DCONDUYT_OTA
          - board: esp32-s2-saola-1
            name: ESP32-S2
            flags: -DCONDUYT_OTA
          - board: esp32-s3-devkitc-1
            name: ESP32-S3
            flags: -DCONDUYT_OTA
          - board: esp32-c3-devkitm-1
            name: ESP32-C3
            flags: -DCONDUYT_OTA
          # ESP8266
          - board: nodemcuv2
            name: NodeMCU v2
          # Arduino AVR
          - board: uno
            name: Arduino Uno R3
          - board: megaatmega2560
            name: Arduino Mega 2560
          - board: nanoatmega328
            name: Arduino Nano
          - board: leonardo
            name: Arduino Leonardo
          # Arduino modern
          - board: nano_every
            name: Arduino Nano Every
          - board: arduino_nano_esp32
            name: Arduino Nano ESP32
            flags: -DCONDUYT_OTA
          - board: uno_r4_minima
            name: Arduino Uno R4 Minima
          - board: uno_r4_wifi
            name: Arduino Uno R4 WiFi
          # Nordic
          - board: nrf52840_dk
            name: nRF52840 DK
          # Raspberry Pi
          - board: pico
            name: Raspberry Pi Pico
          # Teensy
          - board: teensy41
            name: Teensy 4.1
          - board: teensy40
            name: Teensy 4.0
          - board: teensy36
            name: Teensy 3.6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-build-${{ matrix.board }}-${{ hashFiles('firmware/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install platformio
      - name: Build ${{ matrix.name }}
        working-directory: firmware
        env:
          PLATFORMIO_BUILD_FLAGS: ${{ matrix.flags || '' }}
        run: |
          pio ci --board=${{ matrix.board }} \
            examples/BasicBlink/BasicBlink.ino \
            --lib=src \
            --build-dir=ci-build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: firmware/ci-build/.pio/build/${{ matrix.board }}/firmware.*
          if-no-files-found: warn
