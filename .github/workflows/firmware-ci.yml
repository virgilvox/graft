name: Firmware CI

on:
  push:
    paths: ['firmware/**', 'protocol/**']
  pull_request:
    paths: ['firmware/**', 'protocol/**']

jobs:
  desktop-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run C tests
        run: |
          cd firmware/test
          mkdir -p build && cd build
          cmake .. && make
          ./test_crc8
          ./test_cobs
          ./test_wire

  compile-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [uno, esp32dev, nodemcuv2, nrf52840_dk, pico, teensy41]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ matrix.board }}-${{ hashFiles('firmware/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install platformio
      - name: Compile for ${{ matrix.board }}
        run: cd firmware && pio ci --board=${{ matrix.board }} examples/BasicBlink/BasicBlink.ino --lib=src
