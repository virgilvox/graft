name: Swift CI

on:
  push:
    paths: ['sdk/swift/**', 'protocol/**', '.github/workflows/swift-ci.yml']
  pull_request:
    paths: ['sdk/swift/**', 'protocol/**', '.github/workflows/swift-ci.yml']

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: sdk/swift
        run: swift build
      - name: Test
        working-directory: sdk/swift
        run: swift test
