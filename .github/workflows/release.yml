name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: esp32dev
            name: esp32
          - board: uno
            name: uno-r3
          - board: uno_r4_minima
            name: uno-r4-minima
          - board: nodemcuv2
            name: nodemcuv2
          - board: nrf52840_dk
            name: nrf52840-dk
          - board: pico
            name: pico
          - board: teensy41
            name: teensy41
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-release-${{ matrix.board }}-${{ hashFiles('firmware/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install platformio
      - name: Build ${{ matrix.name }}
        run: |
          cd firmware
          pio ci --board=${{ matrix.board }} examples/BasicBlink/BasicBlink.ino --lib=src
          mkdir -p $GITHUB_WORKSPACE/release-artifacts
          find /tmp -name "firmware.*" \( -name "*.bin" -o -name "*.hex" -o -name "*.elf" -o -name "*.uf2" \) 2>/dev/null | while read f; do
            ext="${f##*.}"
            cp "$f" "$GITHUB_WORKSPACE/release-artifacts/conduyt-${{ matrix.name }}.${ext}"
          done
          find /tmp -name "bootloader.bin" -exec cp {} "$GITHUB_WORKSPACE/release-artifacts/conduyt-${{ matrix.name }}-bootloader.bin" \; 2>/dev/null || true
          find /tmp -name "partitions.bin" -exec cp {} "$GITHUB_WORKSPACE/release-artifacts/conduyt-${{ matrix.name }}-partitions.bin" \; 2>/dev/null || true
          # Also check the default ci build location
          find . -path "*/.pio/build/*/firmware.*" \( -name "*.bin" -o -name "*.hex" -o -name "*.elf" -o -name "*.uf2" \) 2>/dev/null | while read f; do
            ext="${f##*.}"
            cp "$f" "$GITHUB_WORKSPACE/release-artifacts/conduyt-${{ matrix.name }}.${ext}"
          done
          echo "=== Artifacts ==="
          ls -la $GITHUB_WORKSPACE/release-artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: ${{ github.workspace }}/release-artifacts/
          if-no-files-found: warn

  build-library-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Arduino library zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p Conduyt
          cp -r firmware/src firmware/examples Conduyt/
          cp firmware/library.properties firmware/library.json Conduyt/
          cp LICENSE Conduyt/ 2>/dev/null || true
          cp README.md Conduyt/ 2>/dev/null || true
          zip -r "Conduyt-${VERSION}.zip" Conduyt/
          echo "ZIP_NAME=Conduyt-${VERSION}.zip" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: library-zip
          path: "*.zip"

  # Package publishing is done manually in this order:
  # 1. cargo publish (sdk/rust) — crates.io
  # 2. wasm-pack build + npm publish (sdk/wasm/pkg) — npm
  # 3. npm publish (sdk/js) — npm
  # 4. python -m build + twine upload (sdk/python) — PyPI
  # Go module is published automatically via git tag on proxy.golang.org

  create-release:
    needs: [build-firmware, build-library-zip]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Collect all release files
          mkdir -p release-files
          find artifacts -type f \( -name "*.bin" -o -name "*.hex" -o -name "*.elf" -o -name "*.zip" \) -exec cp {} release-files/ \;
          ls -la release-files/

          # Create release with all files
          gh release create "$VERSION" release-files/* \
            --title "CONDUYT $VERSION" \
            --generate-notes
