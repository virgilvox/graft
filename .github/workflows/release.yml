name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: esp32dev
            name: esp32
          - board: uno
            name: uno-r3
          - board: uno_r4_minima
            name: uno-r4-minima
          - board: nodemcuv2
            name: nodemcuv2
          - board: nrf52840_dk
            name: nrf52840-dk
          - board: pico
            name: pico
          - board: teensy41
            name: teensy41
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-release-${{ matrix.board }}-${{ hashFiles('firmware/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install platformio
      - name: Build ${{ matrix.name }}
        working-directory: firmware
        run: |
          # Copy example sketch into src so pio run can find it
          cp examples/BasicBlink/BasicBlink.ino src/main.cpp
          pio run -e ${{ matrix.board }}
          rm src/main.cpp
      - name: Collect binaries
        run: |
          mkdir -p release-artifacts
          for ext in bin hex elf uf2; do
            if [ -f "firmware/.pio/build/${{ matrix.board }}/firmware.${ext}" ]; then
              cp "firmware/.pio/build/${{ matrix.board }}/firmware.${ext}" "release-artifacts/conduyt-${{ matrix.name }}.${ext}"
            fi
          done
          # ESP32 bootloader + partitions
          for f in bootloader.bin partitions.bin; do
            if [ -f "firmware/.pio/build/${{ matrix.board }}/${f}" ]; then
              cp "firmware/.pio/build/${{ matrix.board }}/${f}" "release-artifacts/conduyt-${{ matrix.name }}-${f}"
            fi
          done
          echo "=== Release artifacts ==="
          ls -la release-artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: release-artifacts/
          if-no-files-found: warn

  build-library-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Arduino library zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p Conduyt
          cp -r firmware/src firmware/examples Conduyt/
          cp firmware/library.properties firmware/library.json Conduyt/
          cp LICENSE Conduyt/ 2>/dev/null || true
          cp README.md Conduyt/ 2>/dev/null || true
          zip -r "Conduyt-${VERSION}.zip" Conduyt/
      - uses: actions/upload-artifact@v4
        with:
          name: library-zip
          path: "*.zip"

  # Package publishing is done manually in this order:
  # 1. cargo publish (sdk/rust) — crates.io
  # 2. wasm-pack build + npm publish (sdk/wasm/pkg) — npm
  # 3. npm publish (sdk/js) — npm
  # 4. python -m build + twine upload (sdk/python) — PyPI
  # Go module is published automatically via git tag on proxy.golang.org

  create-release:
    needs: [build-firmware, build-library-zip]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Collect all release files
          mkdir -p release-files
          find artifacts -type f \( -name "*.bin" -o -name "*.hex" -o -name "*.elf" -o -name "*.uf2" -o -name "*.zip" \) -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -la release-files/

          # Create release with all files
          gh release create "$VERSION" release-files/* \
            --title "CONDUYT $VERSION" \
            --generate-notes
