; CONDUYT Firmware — PlatformIO Configuration
; Board matrix for CI compile-check + native test env

[platformio]
default_envs = uno

[env]
lib_deps_dir = .
framework = arduino
monitor_speed = 115200

; ── Native (host) test environment ────────────────────────
[env:native]
platform = native
framework =
test_framework = unity
lib_compat_mode = off
lib_deps =
    fabiobatsilva/ArduinoFake@^0.4
build_flags =
    -std=c++17
    -DARDUINO=100
    -DUNIT_TEST
    ; Modules without external library deps — enabled so test_native_modules
    ; can exercise their MOD_CMD dispatch + payload parsing. Library-bound
    ; modules (Servo/NeoPixel/OLED/DHT) need vendor-header stubs to compile
    ; in native, so they are not enabled here.
    -DCONDUYT_MODULE_ENCODER
    -DCONDUYT_MODULE_STEPPER
    -DCONDUYT_MODULE_PID
    -DCONDUYT_MODULE_I2C_PASSTHROUGH
    -Isrc
    -Isrc/conduyt
    -Isrc/conduyt/core
build_src_filter =
    -<*>
test_filter = test_native_*
test_ignore = build*

[env:uno]
platform = atmelavr
board = uno

; ── ESP32 family ─────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags = -DCONDUYT_OTA

[env:esp32s2]
platform = espressif32
board = esp32-s2-saola-1
build_flags = -DCONDUYT_OTA

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags = -DCONDUYT_OTA

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
build_flags = -DCONDUYT_OTA

; esp32c6 — requires ESP-IDF framework, not yet supported with Arduino
; esp32h2 — requires ESP-IDF framework, not yet supported with Arduino

; ── ESP8266 ──────────────────────────────────────────────
[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2

; ── Arduino AVR ──────────────────────────────────────────
[env:mega2560]
platform = atmelavr
board = megaatmega2560

[env:nano]
platform = atmelavr
board = nanoatmega328

[env:leonardo]
platform = atmelavr
board = leonardo

; ── Arduino modern ───────────────────────────────────────
[env:nano_every]
platform = atmelmegaavr
board = nano_every

[env:nano_esp32]
platform = espressif32
board = arduino_nano_esp32
build_flags = -DCONDUYT_OTA

[env:uno_r4_minima]
platform = renesas-ra
board = uno_r4_minima

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi

; ── Nordic nRF ───────────────────────────────────────────
[env:nrf52840_dk]
platform = nordicnrf52
board = nrf52840_dk

; ── Raspberry Pi ─────────────────────────────────────────
[env:pico]
platform = raspberrypi
board = pico

; pico_w — board not yet in PlatformIO registry, uses same RP2040 firmware as pico
; pico2 — RP2350 not yet in PlatformIO registry

; ── Teensy ───────────────────────────────────────────────
[env:teensy41]
platform = teensy
board = teensy41

[env:teensy40]
platform = teensy
board = teensy40

[env:teensy36]
platform = teensy
board = teensy36
