; CONDUYT Firmware — PlatformIO Configuration
; Board matrix for CI compile-check + native test env

[platformio]
default_envs = uno

[env]
lib_deps_dir = .
framework = arduino
monitor_speed = 115200

; ── Native (host) test environment ────────────────────────
[env:native]
platform = native
framework =
test_framework = unity
lib_compat_mode = off
lib_deps =
    fabiobatsilva/ArduinoFake@^0.4
build_flags =
    -std=c++17
    -DARDUINO=100
    -DUNIT_TEST
    -DCONDUYT_MODULE_SERVO
    -Isrc
    -Isrc/conduyt
    -Isrc/conduyt/core
build_src_filter =
    -<*>
test_filter = test_native_*
test_ignore = build*

[env:uno]
platform = atmelavr
board = uno

[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags = -DCONDUYT_OTA

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2

[env:nrf52840_dk]
platform = nordicnrf52
board = nrf52840_dk

[env:pico]
platform = raspberrypi
board = pico

[env:uno_r4_minima]
platform = renesas-ra
board = uno_r4_minima

[env:teensy41]
platform = teensy
board = teensy41
