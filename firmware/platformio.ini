; GRAFT Firmware — PlatformIO Configuration
; Board matrix for CI compile-check

[platformio]
default_envs = uno

[env]
lib_deps_dir = .
framework = arduino
monitor_speed = 115200

[env:uno]
platform = atmelavr
board = uno

[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags = -DGRAFT_OTA

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2

[env:nrf52840_dk]
platform = nordicnrf52
board = nrf52840_dk

[env:pico]
platform = raspberrypi
board = pico

[env:teensy41]
platform = teensy
board = teensy41
