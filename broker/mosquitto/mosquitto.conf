# GRAFT Broker — Mosquitto Configuration
# Self-hostable in < 5 minutes

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Allow anonymous for local dev (disable in production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all

# Max payload (matches GRAFT default)
message_size_limit 65535

# Retained messages for HELLO_RESP and status
max_queued_messages 1000
