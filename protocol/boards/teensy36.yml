# Teensy 3.6 (NXP Kinetis MK66FX1M0)
#
# Source of pin map: PaulStoffregen/cores/teensy3/{core_pins.h,pins_arduino.h,
#   analog.c,pwm.c}, plus PJRC SPI and Wire libraries (SPI.cpp / WireKinetis.h).
# Verified at https://github.com/PaulStoffregen/cores (master).
#
# Pin numbering matches the Teensy 3.6 pinout card. Pins 0-57 are user-
# accessible (top-side headers + bottom-side pads). Pins 58-63 (CORE_NUM_TOTAL_PINS=64)
# are SD-card interface signals — usable as digital I/O only when no SD card is
# present, and not exposed in this board profile.
#
# PWM-capable pins (22 total, from CORE_PINx_PWM macros / FTM+TPM channels):
#   FTM0: 5, 6, 9, 10, 20, 21, 22, 23
#   FTM1: 3, 4
#   FTM2: 29, 30
#   FTM3: 2, 7, 8, 14, 35, 36, 37, 38
#   TPM1: 16, 17
#
# I2C buses (4 hardware peripherals; standard Wire library exposes all four):
#   Wire  (I2C0): SDA=18, SCL=19
#   Wire1 (I2C1): SDA=38, SCL=37
#   Wire2 (I2C2): SDA=4,  SCL=3
#   Wire3 (I2C3): SDA=56, SCL=57   (back-side pads — not exposed here)
#
# SPI buses (3 hardware peripherals, default-pin assignments):
#   SPI  (SPI0): MOSI=11, MISO=12, SCK=13, CS=10
#   SPI1 (SPI1): MOSI=0,  MISO=1,  SCK=32, CS=6     (Note: SCK1=20 is also valid)
#   SPI2 (SPI2): MOSI=44, MISO=45, SCK=46, CS=43    (back-side pads)
#
# ADC pins map to two ADC peripherals (ADC0, ADC1). adc_channel encodes both:
#   bit 7 set => ADC1, lower 7 bits = SCxA channel index (per pin2sc1a[] in analog.c).
#   E.g. 132 = 4 + 128 = ADC1 channel 4. We expose only the canonical A0..A20 +
#   A23/A24 pin aliases that overlap real digital pins (skipping A10/A11/A21/A22/A25/A26
#   which are internal-only on the K66 — DAC, USB-host, and bonded-channel inputs).
#
# Every Teensy 3.6 GPIO supports pin-change interrupts (digitalPinToInterrupt is
# identity for all valid pins).

name: "Teensy 3.6"
mcu: kinetis_k66
arduino_macro: __MK66FX1M0__
platformio_id: teensy36

pin_count: 58
i2c_buses: 3   # standard Wire library exposes Wire/Wire1/Wire2 on top-side pins
spi_buses: 3
uart_count: 6

pins:
  - { name: D0,  caps: [digital_in, digital_out, interrupt, spi], spi_bus: 1, spi_role: copi }   # RX1, MOSI1
  - { name: D1,  caps: [digital_in, digital_out, interrupt, spi], spi_bus: 1, spi_role: cipo }   # TX1, MISO1
  - { name: D2,  caps: [digital_in, digital_out, pwm_out, interrupt] }                           # FTM3_CH0
  - { name: D3,  caps: [digital_in, digital_out, pwm_out, interrupt, i2c_scl], i2c_bus: 2 }      # FTM1_CH0, SCL2
  - { name: D4,  caps: [digital_in, digital_out, pwm_out, interrupt, i2c_sda], i2c_bus: 2 }      # FTM1_CH1, SDA2
  - { name: D5,  caps: [digital_in, digital_out, pwm_out, interrupt] }                           # FTM0_CH7
  - { name: D6,  caps: [digital_in, digital_out, pwm_out, interrupt, spi], spi_bus: 1, spi_role: cs }  # FTM0_CH4, CS1
  - { name: D7,  caps: [digital_in, digital_out, pwm_out, interrupt] }                           # FTM3_CH2, RX3
  - { name: D8,  caps: [digital_in, digital_out, pwm_out, interrupt] }                           # FTM3_CH3, TX3
  - { name: D9,  caps: [digital_in, digital_out, pwm_out, interrupt] }                           # FTM0_CH2, RX2
  - { name: D10, caps: [digital_in, digital_out, pwm_out, interrupt, spi], spi_bus: 0, spi_role: cs }   # FTM0_CH3, CS0
  - { name: D11, caps: [digital_in, digital_out, interrupt, spi], spi_bus: 0, spi_role: copi }   # MOSI0
  - { name: D12, caps: [digital_in, digital_out, interrupt, spi], spi_bus: 0, spi_role: cipo }   # MISO0
  - { name: D13, caps: [digital_in, digital_out, interrupt, spi], spi_bus: 0, spi_role: sck }    # SCK0, LED
  - { name: D14, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 5 }   # A0, FTM3_CH1
  - { name: D15, caps: [digital_in, digital_out, analog_in, interrupt], adc_channel: 14 }        # A1
  - { name: D16, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 8 }    # A2, TPM1_CH0
  - { name: D17, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 9 }    # A3, TPM1_CH1
  - { name: D18, caps: [digital_in, digital_out, analog_in, interrupt, i2c_sda], adc_channel: 13, i2c_bus: 0 }  # A4, SDA0
  - { name: D19, caps: [digital_in, digital_out, analog_in, interrupt, i2c_scl], adc_channel: 12, i2c_bus: 0 }  # A5, SCL0
  - { name: D20, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 6 }    # A6, FTM0_CH5
  - { name: D21, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 7 }    # A7, FTM0_CH6
  - { name: D22, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 15 }   # A8, FTM0_CH0
  - { name: D23, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 4 }    # A9, FTM0_CH1
  - { name: D24, caps: [digital_in, digital_out, interrupt] }
  - { name: D25, caps: [digital_in, digital_out, interrupt] }
  - { name: D26, caps: [digital_in, digital_out, interrupt] }
  - { name: D27, caps: [digital_in, digital_out, interrupt] }
  - { name: D28, caps: [digital_in, digital_out, interrupt] }
  - { name: D29, caps: [digital_in, digital_out, pwm_out, interrupt] }                           # FTM2_CH0
  - { name: D30, caps: [digital_in, digital_out, pwm_out, interrupt] }                           # FTM2_CH1
  - { name: D31, caps: [digital_in, digital_out, analog_in, interrupt], adc_channel: 17 }        # A12 (ADC0)
  - { name: D32, caps: [digital_in, digital_out, analog_in, interrupt, spi], adc_channel: 18, spi_bus: 1, spi_role: sck }   # A13, SCK1
  - { name: D33, caps: [digital_in, digital_out, analog_in, interrupt], adc_channel: 132 }       # A14 (ADC1 ch4)
  - { name: D34, caps: [digital_in, digital_out, analog_in, interrupt], adc_channel: 133 }       # A15 (ADC1 ch5)
  - { name: D35, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 134 }  # A16 (ADC1 ch6), FTM3_CH4
  - { name: D36, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 135 }  # A17 (ADC1 ch7), FTM3_CH5
  - { name: D37, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 145 }  # A18 (ADC1 ch17), FTM3_CH6
  - { name: D38, caps: [digital_in, digital_out, pwm_out, analog_in, interrupt], adc_channel: 17 }   # A19, FTM3_CH7
  - { name: D39, caps: [digital_in, digital_out, analog_in, interrupt], adc_channel: 18 }        # A20
  - { name: D40, caps: [digital_in, digital_out, interrupt] }
  - { name: D41, caps: [digital_in, digital_out, interrupt] }
  - { name: D42, caps: [digital_in, digital_out, interrupt] }
  - { name: D43, caps: [digital_in, digital_out, interrupt, spi], spi_bus: 2, spi_role: cs }     # CS2
  - { name: D44, caps: [digital_in, digital_out, interrupt, spi], spi_bus: 2, spi_role: copi }   # MOSI2
  - { name: D45, caps: [digital_in, digital_out, interrupt, spi], spi_bus: 2, spi_role: cipo }   # MISO2
  - { name: D46, caps: [digital_in, digital_out, interrupt, spi], spi_bus: 2, spi_role: sck }    # SCK2
  - { name: D47, caps: [digital_in, digital_out, interrupt] }
  - { name: D48, caps: [digital_in, digital_out, interrupt] }
  - { name: D49, caps: [digital_in, digital_out, analog_in, interrupt], adc_channel: 138 }       # A23 (ADC1 ch10)
  - { name: D50, caps: [digital_in, digital_out, analog_in, interrupt], adc_channel: 139 }       # A24 (ADC1 ch11)
  - { name: D51, caps: [digital_in, digital_out, interrupt] }
  - { name: D52, caps: [digital_in, digital_out, interrupt] }
  - { name: D53, caps: [digital_in, digital_out, interrupt] }
  - { name: D54, caps: [digital_in, digital_out, interrupt] }
  - { name: D55, caps: [digital_in, digital_out, interrupt] }
  - { name: D56, caps: [digital_in, digital_out, interrupt] }                                    # SDA3 (Wire3, non-default)
  - { name: D57, caps: [digital_in, digital_out, interrupt] }                                    # SCL3 (Wire3, non-default)
