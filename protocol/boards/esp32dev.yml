# ESP32 DevKit (generic ESP32 Dev Module)
# Source: espressif/arduino-esp32 variants/esp32/pins_arduino.h
#
# Notes:
# - SOC_GPIO_PIN_COUNT=40. GPIO 6-11 are wired to internal SPI flash.
# - GPIO 34-39 are input-only.
# - PWM via LEDC on every output-capable GPIO; INTERRUPT on every valid GPIO.
# - We declare ANALOG_IN only on ADC1 pins (GPIO 32-39) since ADC2 (GPIO 0,2,4,
#   12-15,25-27) conflicts with WiFi when WiFi is active.
# - Default I2C0: SDA=21, SCL=22. Default SPI VSPI: CS=5, MOSI=23, MISO=19, SCK=18.
name: "ESP32 DevKit"
mcu: esp32
arduino_macro: ARDUINO_ESP32_DEV
platformio_id: esp32dev
pin_count: 40
i2c_buses: 2
spi_buses: 2
uart_count: 3
pins:
  - { name: GPIO0,  caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO1,  caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO2,  caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO3,  caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO4,  caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO5,  caps: [digital_in, digital_out, pwm_out, interrupt, spi], spi_bus: 1, spi_role: cs }
  - { name: GPIO6,  caps: [] }
  - { name: GPIO7,  caps: [] }
  - { name: GPIO8,  caps: [] }
  - { name: GPIO9,  caps: [] }
  - { name: GPIO10, caps: [] }
  - { name: GPIO11, caps: [] }
  - { name: GPIO12, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO13, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO14, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO15, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO16, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO17, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO18, caps: [digital_in, digital_out, pwm_out, interrupt, spi], spi_bus: 1, spi_role: sck }
  - { name: GPIO19, caps: [digital_in, digital_out, pwm_out, interrupt, spi], spi_bus: 1, spi_role: cipo }
  - { name: GPIO20, caps: [] }
  - { name: GPIO21, caps: [digital_in, digital_out, pwm_out, interrupt, i2c_sda], i2c_bus: 0 }
  - { name: GPIO22, caps: [digital_in, digital_out, pwm_out, interrupt, i2c_scl], i2c_bus: 0 }
  - { name: GPIO23, caps: [digital_in, digital_out, pwm_out, interrupt, spi], spi_bus: 1, spi_role: copi }
  - { name: GPIO24, caps: [] }
  - { name: GPIO25, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO26, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO27, caps: [digital_in, digital_out, pwm_out, interrupt] }
  - { name: GPIO28, caps: [] }
  - { name: GPIO29, caps: [] }
  - { name: GPIO30, caps: [] }
  - { name: GPIO31, caps: [] }
  - { name: GPIO32, caps: [digital_in, digital_out, pwm_out, interrupt, analog_in], adc_channel: 4 }
  - { name: GPIO33, caps: [digital_in, digital_out, pwm_out, interrupt, analog_in], adc_channel: 5 }
  - { name: GPIO34, caps: [digital_in, interrupt, analog_in], adc_channel: 6 }
  - { name: GPIO35, caps: [digital_in, interrupt, analog_in], adc_channel: 7 }
  - { name: GPIO36, caps: [digital_in, interrupt, analog_in], adc_channel: 0 }
  - { name: GPIO37, caps: [digital_in, interrupt, analog_in], adc_channel: 1 }
  - { name: GPIO38, caps: [digital_in, interrupt, analog_in], adc_channel: 2 }
  - { name: GPIO39, caps: [digital_in, interrupt, analog_in], adc_channel: 3 }
