# Arduino Leonardo (ATmega32U4)
# Source: ArduinoCore-avr/variants/leonardo/pins_arduino.h
# Note: SPI is on the ICSP header (D14-D17), distinct from Uno's D10-D13.
# D6/D9/D10 have BOTH PWM and analog_in (alias to A7/A9/A10).
name: "Arduino Leonardo"
mcu: atmega32u4
arduino_macro: ARDUINO_AVR_LEONARDO
platformio_id: leonardo
pin_count: 30
i2c_buses: 1
spi_buses: 1
uart_count: 1
pins:
  - { name: D0,  caps: [digital_in, digital_out, interrupt] }
  - { name: D1,  caps: [digital_in, digital_out, interrupt] }
  - { name: D2,  caps: [digital_in, digital_out, interrupt, i2c_sda], i2c_bus: 0 }
  - { name: D3,  caps: [digital_in, digital_out, pwm_out, interrupt, i2c_scl], i2c_bus: 0 }
  - { name: D4,  caps: [digital_in, digital_out, analog_in], adc_channel: 8 }
  - { name: D5,  caps: [digital_in, digital_out, pwm_out] }
  - { name: D6,  caps: [digital_in, digital_out, pwm_out, analog_in], adc_channel: 10 }
  - { name: D7,  caps: [digital_in, digital_out, interrupt] }
  - { name: D8,  caps: [digital_in, digital_out, analog_in], adc_channel: 11 }
  - { name: D9,  caps: [digital_in, digital_out, pwm_out, analog_in], adc_channel: 12 }
  - { name: D10, caps: [digital_in, digital_out, pwm_out, analog_in], adc_channel: 13 }
  - { name: D11, caps: [digital_in, digital_out, pwm_out] }
  - { name: D12, caps: [digital_in, digital_out, analog_in], adc_channel: 9 }
  - { name: D13, caps: [digital_in, digital_out, pwm_out] }
  - { name: D14, caps: [digital_in, digital_out, spi], spi_bus: 0, spi_role: cipo }
  - { name: D15, caps: [digital_in, digital_out, spi], spi_bus: 0, spi_role: sck }
  - { name: D16, caps: [digital_in, digital_out, spi], spi_bus: 0, spi_role: copi }
  - { name: D17, caps: [digital_in, digital_out, spi], spi_bus: 0, spi_role: cs }
  - { name: A0,  caps: [digital_in, digital_out, analog_in], adc_channel: 7 }
  - { name: A1,  caps: [digital_in, digital_out, analog_in], adc_channel: 6 }
  - { name: A2,  caps: [digital_in, digital_out, analog_in], adc_channel: 5 }
  - { name: A3,  caps: [digital_in, digital_out, analog_in], adc_channel: 4 }
  - { name: A4,  caps: [digital_in, digital_out, analog_in], adc_channel: 1 }
  - { name: A5,  caps: [digital_in, digital_out, analog_in], adc_channel: 0 }
  - { name: A6,  caps: [analog_in], adc_channel: 8 }
  - { name: A7,  caps: [analog_in], adc_channel: 10 }
  - { name: A8,  caps: [analog_in], adc_channel: 11 }
  - { name: A9,  caps: [analog_in], adc_channel: 12 }
  - { name: A10, caps: [analog_in], adc_channel: 13 }
  - { name: A11, caps: [analog_in], adc_channel: 9 }
